{% extends "base.html" %}
{% block title %}報告書提出{% endblock %}

{% block content %}
<div class="page-header">
  <h1>報告書提出</h1>
  <span class="text-muted text-sm">ログイン不要で提出できます</span>
</div>

<div class="card form-card">
  <div class="card-body">
    <form method="POST" action="{{ url_for('public_submit') }}" id="publicForm">

      <!-- 担当メンター -->
      <div class="form-group">
        <label for="teacher_id">担当メンター <span class="required">*</span></label>
        <select id="teacher_id" name="teacher_id" class="form-control" required>
          <option value="">選択してください</option>
          {% for t in teachers %}
          <option value="{{ t.id }}" {% if request.form.get('teacher_id') == t.id|string %}selected{% endif %}>
            {{ t.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <!-- メンティー（サジェスト） -->
      <div class="form-group">
        <label for="student_search">メンティー <span class="required">*</span></label>
        <div class="suggest-wrapper">
          <input type="text" id="student_search" class="form-control"
                 placeholder="メンティー名を入力して検索..." autocomplete="off">
          <input type="hidden" id="student_id" name="student_id"
                 value="{{ request.form.get('student_id', '') }}">
          <div id="suggest-dropdown" class="suggest-dropdown hidden"></div>
        </div>
        <p class="form-hint">担当メンティーが優先表示されます。担当外のメンティーも選択できます。</p>
      </div>

      <!-- 授業実施日・授業時間 -->
      <div class="form-row">
        <div class="form-group">
          <label for="lesson_date">授業実施日 <span class="required">*</span></label>
          <input type="date" id="lesson_date" name="lesson_date" class="form-control"
                 value="{{ request.form.get('lesson_date', '') }}" required>
        </div>
        <div class="form-group">
          <label>授業時間</label>
          <input type="text" class="form-control" value="45分" readonly>
          <input type="hidden" name="lesson_duration" value="45分">
        </div>
      </div>

      <!-- 授業内容 -->
      <div class="form-group">
        <label for="content">授業内容・進捗メモ <span class="optional">（任意）</span></label>
        <textarea id="content" name="content" class="form-control" rows="4"
                  placeholder="今日の授業内容や理解度、進捗状況などを記入してください">{{ request.form.get('content', '') }}</textarea>
      </div>

      <!-- 次回の授業予定 -->
      <div class="form-group">
        <label for="next_plan">次回の授業予定 <span class="optional">（任意）</span></label>
        <textarea id="next_plan" name="next_plan" class="form-control" rows="2"
                  placeholder="次回取り組む予定の内容">{{ request.form.get('next_plan', '') }}</textarea>
      </div>

      <!-- 次回授業日程 -->
      <div class="form-group">
        <label for="next_lesson_date">次回授業日程 <span class="optional">（任意）</span></label>
        <input type="date" id="next_lesson_date" name="next_lesson_date" class="form-control"
               value="{{ request.form.get('next_lesson_date', '') }}">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">提出する</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const teacherSelect = document.getElementById('teacher_id');
  const searchInput   = document.getElementById('student_search');
  const hiddenInput   = document.getElementById('student_id');
  const dropdown      = document.getElementById('suggest-dropdown');
  let debounceTimer   = null;

  const GROUP_LABEL = { assigned: '担当メンティー', other: '担当外', none: '担当なし（未割当）' };

  function getTeacherId() {
    return teacherSelect ? teacherSelect.value : '';
  }

  function fetchSuggestions(q) {
    const tid = getTeacherId();
    const url = `/api/public/students?q=${encodeURIComponent(q)}&teacher_id=${tid}`;
    fetch(url).then(r => r.json()).then(data => renderDropdown(data));
  }

  function renderDropdown(items) {
    dropdown.innerHTML = '';
    if (!items.length) { dropdown.classList.add('hidden'); return; }
    let lastGroup = null;
    items.forEach(item => {
      const g = item.group || null;
      if (g && g !== lastGroup) {
        const header = document.createElement('div');
        header.className = 'suggest-group-header';
        header.textContent = GROUP_LABEL[g] || g;
        dropdown.appendChild(header);
        lastGroup = g;
      }
      const el = document.createElement('div');
      el.className = 'suggest-item' + (g === 'assigned' ? ' assigned' : '');
      el.textContent = item.name;
      el.addEventListener('mousedown', () => {
        hiddenInput.value = item.id;
        searchInput.value = item.name;
        dropdown.classList.add('hidden');
      });
      dropdown.appendChild(el);
    });
    dropdown.classList.remove('hidden');
  }

  searchInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    hiddenInput.value = '';
    debounceTimer = setTimeout(() => fetchSuggestions(this.value), 200);
  });
  searchInput.addEventListener('focus', function() { fetchSuggestions(this.value); });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.suggest-wrapper')) dropdown.classList.add('hidden');
  });
  teacherSelect.addEventListener('change', function() {
    searchInput.value = '';
    hiddenInput.value = '';
    dropdown.classList.add('hidden');
  });

  // バリデーション: student_id が未選択のまま送信しないようにする
  document.getElementById('publicForm').addEventListener('submit', function(e) {
    if (!hiddenInput.value) {
      e.preventDefault();
      searchInput.focus();
      searchInput.style.borderColor = 'var(--danger, #e53e3e)';
      alert('メンティーをリストから選択してください。');
    }
  });
})();
</script>
{% endblock %}
